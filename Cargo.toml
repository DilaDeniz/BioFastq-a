[package]
name = "biofastq-a"
version = "1.0.0"
edition = "2021"
description = "Dilo Science Terminal - High-performance FASTQ/FASTA analysis TUI"

[dependencies]
needletail = "0.7"
rayon = "1.10"
ratatui = "0.30"
crossterm = "0.28"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = 3
lto = true
